  <header class="site-header">

        <h3 class="card-title">Penguin</h3>
        <p class="card-sub">₹129.00</p>

      <article class="card">
        <img src="images/bm3.png" alt="Boho Bookmark" class="card-img">
        <h3 class="card-title">Boho</h3>
        <p class="card-sub">₹129.00</p>
