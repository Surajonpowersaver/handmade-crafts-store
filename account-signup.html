<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account Signup</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html">Handmade Minimal</a>
      <nav class="nav">
        <a href="index.html">Home</a>
      </nav>
      <button id="nav-toggle" class="nav-toggle">☰</button>
    </div>
  </header>

  <main>
    <div class="form-container">
      <h2>Create an Account</h2>
      <form id="signupForm">
        <form id="signupForm">
            <input type="text" id="name" placeholder="Enter your name" required>
            <input type="email" id="email" placeholder="Enter your email" required>
            <input type="password" id="password" placeholder="Enter password" required>
            <input type="password" id="confirmPassword" placeholder="Confirm password" required>
            <button type="submit" class="btn-primary">Signup</button>
            <p>Already have an account? <a href="account-login.html">Login</a></p>
          </form>
    </div>
  </main>

  <script>
    document.getElementById("signupForm").addEventListener("submit", async function(e){
      e.preventDefault();

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      try {
        const resp = await fetch('/api/auth/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) {
          alert(data.message || 'Signup failed');
          return;
        }
        try { localStorage.setItem('auth_email', email); } catch (_) {}
        alert('Signup successful! You can now log in.');
        window.location.href = 'account-login.html';
      } catch (err) {
        alert('Network error. Please try again.');
      }
    });
  </script>
</body>
</html>
